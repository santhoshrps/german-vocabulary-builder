name = "german-vocabulary-read-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Same D1 database as the write worker — this worker only reads from it.
[[d1_databases]]
binding = "DB"
database_name = "german-vocabulary"
database_id = "b84997d9-5e78-493e-a43e-9d8aafd1ca95"

# Short-lived challenges (nonces) and rate-limit counters live in D1 (src/limits.ts:
# `challenges` / `rate_limits` in schema/extra.sql) — single-writer SQLite makes the
# consume/increment checks atomic, which eventually-consistent KV could not.

[observability]
enabled = true

[vars]
# Your Apple Developer Team ID and the app's bundle id (used for App Attest appId hash).
APP_TEAM_ID = "3VF33Y593F"
APP_BUNDLE_ID = "com.ramapurampalanivel.germanwords"
# Comma-separated StoreKit product ids that grant full access.
ENTITLEMENT_PRODUCT_IDS = "com.ramapurampalanivel.germanwords.fullaccess.lifetime"
# Session JWT lifetime in seconds. Kept short (10 min) so a leaked/shared session token is only
# usable for a small window; the client renews on demand in the foreground (it reads `expiresIn`,
# so this is transparent — no app change) and never renews in the background.
SESSION_TTL_SECONDS = "600"
# App Attest environment: "production" or "development".
APP_ATTEST_ENV = "production"
# StoreKit environment. "production" verifies transactions against Apple's Root CA.
# "xcode" (dev only) trusts locally-signed StoreKit Configuration File transactions
# WITHOUT Apple verification or App Attest — it lives ONLY in the [env.dev] block
# below and is additionally refused at runtime whenever APP_ATTEST_ENV="production"
# (see storeKitXcodeMode in src/entitlement.ts). Keep this "production" here so a
# bare `wrangler deploy` always ships the locked-down config.
STOREKIT_ENV = "production"

# Secrets (set with `wrangler secret put <NAME>`), never committed:
#   SESSION_JWT_SECRET          random 32+ byte secret for signing session JWTs (openssl rand -hex 32)
#   APPLE_APPATTEST_ROOT_CA     base64 DER of Apple App Attest Root CA (from Apple)
#   APPLE_STOREKIT_ROOT_CA      base64 DER of Apple Root CA - G3 (from Apple)

# Audio (and future image) assets: packs + manifest written by sync/audio_sync.py.
# Create the bucket once:  wrangler r2 bucket create german-vocabulary-media
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "german-vocabulary-media"

# Optional: large snapshot blobs served from R2 with range/resume support.
# [[r2_buckets]]
# binding = "SNAPSHOTS"
# bucket_name = "german-vocabulary-snapshots"

# ---------------------------------------------------------------------------
# Development / staging environment — the ONLY place StoreKit "xcode" mode lives.
#
#   Local run:   npm run dev         (wrangler dev --env dev)
#   Deploy:      npm run deploy:dev   (wrangler deploy --env dev)
#                → https://german-vocabulary-read-worker-dev.<subdomain>.workers.dev
#
# DEBUG builds of the iOS app point at the -dev origin (VocabularySyncConfig.swift);
# release builds hit the production worker above. A bare `wrangler deploy`
# (npm run deploy) ships the SECURE production config — xcode mode is never on it,
# and even if it were, storeKitXcodeMode() refuses it while APP_ATTEST_ENV is
# "production". This dev origin knowingly trusts local StoreKit transactions, so
# keep its URL out of release builds (the #if DEBUG split guarantees that).
#
# Named environments do NOT inherit vars or bindings, so they are re-declared here.
# Set this env's secrets separately, e.g.:
#   wrangler secret put SESSION_JWT_SECRET --env dev
# ---------------------------------------------------------------------------
[[env.dev.d1_databases]]
binding = "DB"
database_name = "german-vocabulary"
database_id = "b84997d9-5e78-493e-a43e-9d8aafd1ca95"

[[env.dev.r2_buckets]]
binding = "MEDIA"
bucket_name = "german-vocabulary-media"

[env.dev.observability]
enabled = true

[env.dev.vars]
APP_TEAM_ID = "3VF33Y593F"
APP_BUNDLE_ID = "com.ramapurampalanivel.germanwords"
ENTITLEMENT_PRODUCT_IDS = "com.ramapurampalanivel.germanwords.fullaccess.lifetime"
SESSION_TTL_SECONDS = "600"
# App Attest development mode — REQUIRED to pair with StoreKit "xcode" mode
# (storeKitXcodeMode refuses xcode when this is "production").
APP_ATTEST_ENV = "development"
# Local Xcode StoreKit testing: trust locally-signed transactions (dev origin only).
STOREKIT_ENV = "xcode"
