# Read worker — three fully isolated environments (MS2-FR-29/30):
#
#   prod (top level)  → the live app.            Deploy ONLY via scripts/deploy.sh.
#   [env.dev]         → Xcode DEBUG builds + TestFlight phones flipped to Development.
#   [env.test]        → automated integration tests + backend experiments; disposable.
#
# Each environment has its OWN content database, ops database, media bucket and
# secrets. Wrangler named environments do NOT inherit vars or bindings, so every
# block re-declares its full configuration; scripts/deploy.sh verifies secret
# parity (names only) before every deploy and asserts /health (env + version +
# config) after it. DEPLOY_VERSION is injected by the deploy script — never set here.
#
# Blue/green state (MS2-FR-29c): ALL environments are on their v2 worlds
# (cutover completed 2026-07-18). The legacy database ("german-vocabulary") and
# bucket ("german-vocabulary-media") are FROZEN as instant rollback — revert the
# prod bindings here and redeploy to roll back — and are decommissioned after
# the soak window.

name = "german-vocabulary-read-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Short-lived challenges (nonces) and rate-limit counters live in the OPS database
# (src/limits.ts) — single-writer SQLite makes the consume/increment checks atomic,
# which eventually-consistent KV could not.

# ---------------------------------------------------------------------------
# PROD
# ---------------------------------------------------------------------------

[[d1_databases]]
binding = "CONTENT_DB"
database_name = "german-content-prod"
database_id = "79a2229f-0615-4203-8f82-d271a391b1d5"

[[d1_databases]]
binding = "OPS_DB"
database_name = "german-ops-prod"
database_id = "e9a72e23-d8dd-4b3b-b550-4940728b15fc"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "german-media-prod"

# Daily retention sweep (app repo settings.md ST-FR-FDBK-5): erases expired feedback reply
# addresses. The write path prunes opportunistically too, but a promise to delete personal
# data within 30 days cannot depend on another user happening to send feedback — this is the
# guarantee. Named environments do NOT inherit triggers, so every environment declares its own.
[triggers]
crons = ["17 3 * * *"]

[observability]
enabled = true

[vars]
ENV_NAME = "prod"
# Your Apple Developer Team ID and the app's bundle id (used for App Attest appId hash).
APP_TEAM_ID = "3VF33Y593F"
APP_BUNDLE_ID = "com.ramapurampalanivel.germanwords"
# Comma-separated StoreKit product ids that grant full access.
ENTITLEMENT_PRODUCT_IDS = "com.ramapurampalanivel.germanwords.fullaccess.lifetime"
# Session JWT lifetime in seconds. Kept short (10 min) so a leaked/shared session token is only
# usable for a small window; the client renews on demand in the foreground (it reads `expiresIn`,
# so this is transparent — no app change) and never renews in the background.
SESSION_TTL_SECONDS = "600"
# Forward-compat floor (MS2-FR-23): bump ONLY for a breaking content change.
MIN_CLIENT_GENERATION = "1"
# App Attest environment: "production" or "development".
APP_ATTEST_ENV = "production"
# StoreKit environment. "production" verifies transactions against Apple's Root CA.
# "xcode" (dev/test only) trusts locally-signed StoreKit Configuration File transactions
# WITHOUT Apple verification or App Attest — additionally refused at runtime whenever
# APP_ATTEST_ENV="production" (see storeKitXcodeMode in src/entitlement.ts). Keep this
# "production" here so a bare `wrangler deploy` always ships the locked-down config.
STOREKIT_ENV = "production"
# Direct-from-storage pack delivery (MS-NFR-PERF-3): account id + bucket for minting
# presigned R2 URLs. The access key pair are SECRETS (wrangler secret put
# R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY) from an R2 API token scoped to READ this
# bucket only. Leave unset to disable: clients then use the streamed route (and
# /health reports the gap as "degraded").
R2_ACCOUNT_ID = "50163e5bf5ee8a574fb5e2dd442e38ed"
# Presign secrets for THIS bucket: the german-media-prod-read token pair.
# Until set, packurl answers 503 and clients use the streamed route.
R2_MEDIA_BUCKET = "german-media-prod"

# Secrets per environment (wrangler secret put <NAME> [--env dev|test]), never committed:
#   SESSION_JWT_SECRET           random 32+ byte signing secret (openssl rand -hex 32)
#   SESSION_JWT_SECRET_PREVIOUS  ONLY during a key-rotation grace window (MS2-FR-30e)
#   APPLE_APPATTEST_ROOT_CA      base64 DER of Apple App Attest Root CA
#   APPLE_STOREKIT_ROOT_CA       base64 DER of Apple Root CA - G3
#   R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY   bucket-scoped R2 read token

# ---------------------------------------------------------------------------
# DEV — Xcode DEBUG builds + TestFlight "Development" switch.
# The ONLY environment where StoreKit "xcode" mode lives alongside prod's bundle id.
#   Local run:   npm run dev          (wrangler dev --env dev)
#   Deploy:      scripts/deploy.sh dev
# ---------------------------------------------------------------------------

[[env.dev.d1_databases]]
binding = "CONTENT_DB"
database_name = "german-content-dev"
database_id = "8cc25e6f-df57-4704-892c-fdc78ebc246d"

[[env.dev.d1_databases]]
binding = "OPS_DB"
database_name = "german-ops-dev"
database_id = "ef5fc11a-a46e-415d-8b3a-99d670cea562"

[[env.dev.r2_buckets]]
binding = "MEDIA"
bucket_name = "german-media-dev"

[env.dev.triggers]
crons = ["17 3 * * *"]

[env.dev.observability]
enabled = true

[env.dev.vars]
ENV_NAME = "dev"
APP_TEAM_ID = "3VF33Y593F"
APP_BUNDLE_ID = "com.ramapurampalanivel.germanwords"
ENTITLEMENT_PRODUCT_IDS = "com.ramapurampalanivel.germanwords.fullaccess.lifetime"
SESSION_TTL_SECONDS = "600"
# Forward-compat floor (MS2-FR-23): bump ONLY for a breaking content change.
MIN_CLIENT_GENERATION = "1"
# App Attest development mode: accepts development-environment attestations from
# Xcode builds AND production-environment attestations from TestFlight builds whose
# user flipped the in-app Environment switch (MS2-FR-31).
APP_ATTEST_ENV = "development"
# Local Xcode StoreKit testing: trust locally-signed transactions (dev origin only).
STOREKIT_ENV = "xcode"
R2_ACCOUNT_ID = "50163e5bf5ee8a574fb5e2dd442e38ed"
# Presign secrets for THIS bucket: the german-media-dev-read token pair
# (wrangler secret put R2_ACCESS_KEY_ID/R2_SECRET_ACCESS_KEY --env dev).
# Until set, packurl answers 503 and clients use the streamed route.
R2_MEDIA_BUCKET = "german-media-dev"

# ---------------------------------------------------------------------------
# TEST — automated integration tests + backend sandbox (MS2-FR-32). Disposable:
# fixtures are seeded before a suite and wiped at the START of the next run.
#   Deploy:      scripts/deploy.sh test
# ---------------------------------------------------------------------------

[[env.test.d1_databases]]
binding = "CONTENT_DB"
database_name = "german-content-test"
database_id = "8d110ea2-8f7d-4ff2-adc6-0465701bcf88"

[[env.test.d1_databases]]
binding = "OPS_DB"
database_name = "german-ops-test"
database_id = "7c2dd3ae-4ce1-4eb3-ba7c-7adbb835ed19"

[[env.test.r2_buckets]]
binding = "MEDIA"
bucket_name = "german-media-test"

[env.test.triggers]
crons = ["17 3 * * *"]

[env.test.observability]
enabled = true

[env.test.vars]
ENV_NAME = "test"
APP_TEAM_ID = "3VF33Y593F"
APP_BUNDLE_ID = "com.ramapurampalanivel.germanwords"
ENTITLEMENT_PRODUCT_IDS = "com.ramapurampalanivel.germanwords.fullaccess.lifetime"
SESSION_TTL_SECONDS = "600"
# Forward-compat floor (MS2-FR-23): bump ONLY for a breaking content change.
MIN_CLIENT_GENERATION = "1"
APP_ATTEST_ENV = "development"
STOREKIT_ENV = "xcode"
R2_ACCOUNT_ID = "50163e5bf5ee8a574fb5e2dd442e38ed"
R2_MEDIA_BUCKET = "german-media-test"
